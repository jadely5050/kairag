<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Edu RAG MVP Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('main');
            const [role, setRole] = useState('teacher');
            const [input, setInput] = useState('');
            const [isSearching, setIsSearching] = useState(false);
            const [showResult, setShowResult] = useState(false);

            // 가상 시나리오 데이터
            const scenarioData = {
                teacher: {
                    title: "AI 수업 설계 보조",
                    desc: "교육청 승인 우수 사례와 KBS 아카이브를 결합한 수업안을 제안합니다.",
                    actions: ["'기후 위기' 단원 활동지 생성", "KBS 환경 다큐멘터리 클립 찾기", "교육과정 성취기준 확인"]
                },
                student: {
                    title: "우리 지역 학습 튜터",
                    desc: "교과서 질문부터 지역 체험학습 정보까지 AI가 답변해 드립니다.",
                    actions: ["우리 동네 과학관 프로그램 예약", "수학 익힘책 42쪽 풀이", "학교 급식 메뉴 확인"]
                }
            };

            const handleSearch = (e) => {
                e.preventDefault();
                if(!input) return;
                setIsSearching(true);
                setShowResult(false);
                
                // 검색 시뮬레이션 (1.5초)
                setTimeout(() => {
                    setIsSearching(false);
                    setShowResult(true);
                }, 1500);
            };

            return (
                <div className="min-h-screen">
                    {/* 상단 네비게이션 */}
                    <header className="bg-white border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('main')}>
                            <div className="bg-blue-600 text-white p-1.5 rounded-lg font-black text-xl">K</div>
                            <span className="font-bold text-xl tracking-tight text-blue-900">K-Edu <span className="text-blue-500 font-medium text-sm">RAG Platform</span></span>
                        </div>
                        <nav className="hidden md:flex gap-8 font-semibold text-gray-600">
                            <button onClick={() => setView('main')} className={view === 'main' ? 'text-blue-600' : ''}>통합검색</button>
                            <button onClick={() => setView('persona')} className={view === 'persona' ? 'text-blue-600' : ''}>맞춤서비스</button>
                            <button onClick={() => setView('admin')} className={view === 'admin' ? 'text-blue-600' : ''}>안전관리(BM-2)</button>
                        </nav>
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center text-xs">👤</div>
                            <span className="text-sm font-medium">홍길동 선생님</span>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-6 md:p-12">
                        
                        {/* 1. 메인 검색 뷰 */}
                        {view === 'main' && (
                            <div className="fade-in space-y-10">
                                <section className="text-center space-y-4">
                                    <h2 className="text-4xl font-extrabold text-gray-900 leading-tight">지식의 근거를 찾는<br/><span className="text-blue-600 underline decoration-blue-200 underline-offset-8">AI 교육 검색 엔진</span></h2>
                                    <p className="text-gray-500 text-lg">KBS 영상 콘텐츠와 교육청 공식 문서를 기반으로 답변합니다.</p>
                                </section>

                                <form onSubmit={handleSearch} className="max-w-3xl mx-auto relative group">
                                    <input 
                                        type="text" 
                                        className="w-full p-6 pl-8 pr-20 rounded-3xl border-2 border-blue-100 shadow-2xl focus:outline-none focus:border-blue-500 text-xl transition-all group-hover:shadow-blue-100"
                                        placeholder="궁금한 교육 정보를 입력하세요..."
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                    />
                                    <button className="absolute right-4 top-4 bg-blue-600 text-white p-3 rounded-2xl hover:bg-blue-700 shadow-lg">
                                        {isSearching ? <span className="inline-block animate-spin">⏳</span> : "검색"}
                                    </button>
                                </form>

                                {showResult && (
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mt-12 fade-in">
                                        <div className="md:col-span-2 bg-white rounded-3xl p-8 shadow-sm border border-gray-100">
                                            <div className="flex items-center gap-2 mb-6">
                                                <span className="bg-green-100 text-green-700 text-xs font-bold px-3 py-1 rounded-full uppercase">KBS & 교육청 교차 검증됨</span>
                                            </div>
                                            <div className="prose prose-blue text-gray-700 text-lg leading-relaxed">
                                                질문하신 <strong>'기후 위기 대응 수업'</strong>에 대한 답변입니다. 교육청 배포 '탄소중립 교육 가이드'에 따르면 초등 고학년 대상으로는 실감형 콘텐츠를 활용한 토론 수업이 권장됩니다. <br/><br/>
                                                특히 <strong>KBS 다큐멘터리 '지구의 경고'</strong> 22분 지점의 빙하 감소 데이터를 시각 자료로 활용하시면 학생들의 몰입도를 80% 이상 높일 수 있다는 연구 사례가 있습니다.
                                            </div>
                                        </div>
                                        <div className="bg-blue-50 rounded-3xl p-6 border border-blue-100 h-fit">
                                            <h4 className="font-bold text-blue-900 mb-4 flex items-center gap-2">📍 신뢰할 수 있는 출처</h4>
                                            <ul className="space-y-4">
                                                <li className="bg-white p-3 rounded-xl shadow-sm border border-blue-50">
                                                    <p className="text-xs text-red-500 font-bold mb-1">[VIDEO] KBS 아카이브</p>
                                                    <p className="text-sm font-semibold text-gray-800 tracking-tight leading-tight">KBS 스페셜: 지구의 경고 (2024)</p>
                                                    <p className="text-[10px] text-blue-500 mt-1 cursor-pointer">▶ 22:15 지점 바로보기</p>
                                                </li>
                                                <li className="bg-white p-3 rounded-xl shadow-sm border border-blue-50 text-sm">
                                                    <p className="text-xs text-blue-500 font-bold mb-1">[DOC] 교육청 가이드</p>
                                                    <p className="text-sm font-semibold text-gray-800 tracking-tight leading-tight">2024 미래형 수업 설계 우수사례집</p>
                                                    <p className="text-[10px] text-blue-500 mt-1 cursor-pointer">📄 p.128 관련 내용 확인</p>
                                                </li>
                                            </ul>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 2. 대상별 맞춤 서비스 뷰 */}
                        {view === 'persona' && (
                            <div className="fade-in space-y-8">
                                <div className="flex justify-center gap-2 p-1 bg-gray-200 rounded-2xl w-fit mx-auto">
                                    <button onClick={() => setRole('teacher')} className={`px-8 py-3 rounded-xl font-bold transition ${role === 'teacher' ? 'bg-white shadow text-blue-600' : 'text-gray-500'}`}>교사용</button>
                                    <button onClick={() => setRole('student')} className={`px-8 py-3 rounded-xl font-bold transition ${role === 'student' ? 'bg-white shadow text-blue-600' : 'text-gray-500'}`}>학생/학부모용</button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-indigo-700 text-white p-10 rounded-[3rem] shadow-xl relative overflow-hidden">
                                        <div className="relative z-10">
                                            <h3 className="text-3xl font-bold mb-4">{scenarioData[role].title}</h3>
                                            <p className="opacity-80 mb-8 leading-relaxed">{scenarioData[role].desc}</p>
                                            <div className="space-y-3">
                                                {scenarioData[role].actions.map((act, i) => (
                                                    <div key={i} className="bg-white/10 p-4 rounded-2xl border border-white/20 cursor-pointer hover:bg-white/20 transition flex justify-between items-center group">
                                                        <span>{act}</span>
                                                        <span className="opacity-0 group-hover:opacity-100">→</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="absolute -bottom-10 -right-10 w-40 h-40 bg-white/5 rounded-full"></div>
                                    </div>

                                    <div className="bg-white border p-10 rounded-[3rem] shadow-sm flex flex-col justify-between">
                                        <div>
                                            <h3 className="text-2xl font-bold mb-4 flex items-center gap-2 text-gray-800">🏫 우리 학교 소식 검색</h3>
                                            <p className="text-gray-500 mb-6 text-sm italic">학교 홈페이지와 가정통신문을 자연어로 검색하세요.</p>
                                            <div className="bg-gray-100 p-4 rounded-2xl mb-4 border border-gray-200">
                                                <p className="text-gray-400 text-sm">질문 예시: "올해 여름방학 시작일이 언제야?"</p>
                                            </div>
                                        </div>
                                        <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100 italic text-sm text-blue-800 font-medium">
                                            "2024학년도 학사일정에 따르면 방학식은 7월 19일(금)입니다."
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. 관리자 대시보드 뷰 */}
                        {view === 'admin' && (
                            <div className="fade-in space-y-8">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 border-b pb-6">
                                    <div>
                                        <h2 className="text-3xl font-black text-gray-900 flex items-center gap-3 underline decoration-green-400">BM-2 SAFE GATEWAY</h2>
                                        <p className="text-gray-500 mt-2 font-medium tracking-tight">안전한 교육용 AI 거버넌스 및 성과 모니터링</p>
                                    </div>
                                    <div className="bg-green-100 text-green-700 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest animate-pulse border border-green-200">System Online</div>
                                </div>

                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {[
                                        { label: "실시간 질문량", val: "2,401건", color: "bg-blue-600" },
                                        { label: "유해 콘텐츠 차단", val: "15건", color: "bg-red-500" },
                                        { label: "개인정보 필터링", val: "Active", color: "bg-indigo-600" },
                                        { label: "토큰 효율성", val: "94%", color: "bg-gray-800" }
                                    ].map((stat, i) => (
                                        <div key={i} className={`${stat.color} p-6 rounded-3xl text-white shadow-lg`}>
                                            <p className="text-xs opacity-70 mb-1 font-bold">{stat.label}</p>
                                            <p className="text-2xl font-black">{stat.val}</p>
                                        </div>
                                    ))}
                                </div>

                                <div className="bg-white border rounded-[2rem] overflow-hidden shadow-sm mt-8">
                                    <div className="p-6 border-b bg-gray-50 flex justify-between items-center">
                                        <h4 className="font-bold text-gray-800">⚠️ 실시간 보안 필터링 로그</h4>
                                        <span className="text-[10px] text-gray-400">Update: Every 5s</span>
                                    </div>
                                    <div className="p-6 space-y-3 font-mono text-xs">
                                        <div className="flex justify-between items-center p-3 bg-gray-50 rounded-xl border-l-4 border-green-500">
                                            <span className="text-gray-600">[11:45:02] <span className="font-bold text-blue-600 underline">교사_ID_0421</span> 질문: "단원 평가 문제 생성"</span>
                                            <span className="text-green-600 font-bold">● ALLOWED</span>
                                        </div>
                                        <div className="flex justify-between items-center p-3 bg-red-50 rounded-xl border-l-4 border-red-500">
                                            <span className="text-gray-600">[11:42:15] <span className="font-bold text-red-600 underline">학생_IP_128.01</span> 질문: "[부적절한 욕설 포함]"</span>
                                            <span className="text-red-600 font-bold">■ BLOCKED</span>
                                        </div>
                                        <div className="flex justify-between items-center p-3 bg-gray-50 rounded-xl border-l-4 border-green-500">
                                            <span className="text-gray-600">[11:40:59] <span className="font-bold text-blue-600 underline">학생_IP_128.22</span> 질문: "독도 역사에 대해 알려줘"</span>
                                            <span className="text-green-600 font-bold">● ALLOWED</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 푸터 */}
                    <footer className="text-center py-10 text-gray-400 text-xs font-medium border-t mt-20">
                        © 2024 K-Edu RAG Platform MVP. Powered by KBS & Ministry of Education.
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
