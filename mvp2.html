<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Edu RAG - 교사용 AI 튜터 MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; overflow: hidden; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [query, setQuery] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [showResult, setShowResult] = useState(false);
            const [rightTab, setRightTab] = useState('video'); // 'video' or 'doc'
            const chatEndRef = useRef(null);

            const handleSubmit = (e) => {
                e.preventDefault();
                if(!query.trim()) return;
                
                setIsGenerating(true);
                setShowResult(false);
                
                // AI 생성 시뮬레이션 (1.5초)
                setTimeout(() => {
                    setIsGenerating(false);
                    setShowResult(true);
                }, 1500);
            };

            useEffect(() => {
                if(showResult && chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [showResult]);

            return (
                <div className="flex flex-col h-screen">
                    {/* 1. 헤더 (상단 네비게이션 바) */}
                    <header className="h-16 bg-white border-b flex items-center justify-between px-6 shrink-0 z-10 relative shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 text-white p-1.5 rounded-lg font-black text-xl leading-none">K</div>
                            <span className="font-extrabold text-xl tracking-tight text-blue-900">K-Edu <span className="text-blue-500 font-medium text-sm ml-1">RAG AI 튜터</span></span>
                        </div>
                        <nav className="hidden md:flex gap-1 bg-gray-100 p-1 rounded-lg border">
                            <button className="px-4 py-1.5 bg-white text-blue-600 font-bold rounded shadow-sm text-sm">AI 튜터</button>
                            <button className="px-4 py-1.5 text-gray-500 hover:text-gray-900 font-medium rounded text-sm transition">지역 맞춤 학습</button>
                            <button className="px-4 py-1.5 text-gray-500 hover:text-gray-900 font-medium rounded text-sm transition">학교 홈페이지 검색</button>
                            <button className="px-4 py-1.5 text-gray-500 hover:text-gray-900 font-medium rounded text-sm transition flex items-center gap-1">세이프 AI 대시보드</button>
                        </nav>
                        <div className="flex items-center gap-3">
                            <div className="text-right hidden sm:block">
                                <p className="text-sm font-bold text-gray-800">김미영 선생님</p>
                                <p className="text-xs text-gray-500">서울중학교 · 중2 과학</p>
                            </div>
                            <div className="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold border border-blue-200">김</div>
                        </div>
                    </header>

                    {/* 메인 레이아웃 */}
                    <div className="flex flex-1 overflow-hidden">
                        
                        {/* 2. 좌측 패널 (사이드바 - 히스토리 및 관리) */}
                        <aside className="w-64 bg-gray-50 border-r flex flex-col shrink-0">
                            <div className="p-4">
                                <button 
                                    onClick={() => {setShowResult(false); setQuery('');}}
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl font-semibold flex items-center justify-center gap-2 transition shadow-sm"
                                >
                                    <i data-lucide="plus" className="w-4 h-4"></i> 새로운 수업 설계
                                </button>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 pt-0">
                                <p className="text-xs font-bold text-gray-400 mb-3 uppercase tracking-wider">최근 수업 기록</p>
                                <ul className="space-y-1">
                                    <li className="p-2.5 hover:bg-gray-200 rounded-lg cursor-pointer text-sm text-gray-700 flex items-center gap-2 font-medium bg-gray-200">
                                        <i data-lucide="message-square" className="w-4 h-4 text-gray-500"></i> 중2 과학 태양계
                                    </li>
                                    <li className="p-2.5 hover:bg-gray-200 rounded-lg cursor-pointer text-sm text-gray-700 flex items-center gap-2">
                                        <i data-lucide="message-square" className="w-4 h-4 text-gray-400"></i> 조선 후기 실학 활동지
                                    </li>
                                    <li className="p-2.5 hover:bg-gray-200 rounded-lg cursor-pointer text-sm text-gray-700 flex items-center gap-2">
                                        <i data-lucide="message-square" className="w-4 h-4 text-gray-400"></i> 기후위기 토론 논제
                                    </li>
                                </ul>
                            </div>

                            <div className="p-4 border-t bg-gray-100">
                                <div className="bg-white p-3 rounded-xl border border-blue-100 shadow-sm flex items-start gap-2">
                                    <i data-lucide="shield-alert" className="w-4 h-4 text-blue-500 mt-0.5 shrink-0"></i>
                                    <div>
                                        <p className="text-xs font-bold text-gray-800">저작권/라이선스 가이드</p>
                                        <p className="text-[10px] text-gray-500 mt-1 leading-tight">본 플랫폼의 KBS 영상은 수업 목적의 교내 활용만 허용됩니다. (외부 배포 주의)</p>
                                    </div>
                                </div>
                            </div>
                        </aside>

                        {/* 3. 중앙 메인 화면 (AI 챗봇 영역) */}
                        <main className="flex-1 flex flex-col bg-white relative">
                            {/* 대화 영역 */}
                            <div className="flex-1 overflow-y-auto p-8 pb-32">
                                {!showResult && !isGenerating ? (
                                    <div className="h-full flex flex-col items-center justify-center text-center fade-in max-w-lg mx-auto">
                                        <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-6 shadow-inner">
                                            <i data-lucide="sparkles" className="w-8 h-8"></i>
                                        </div>
                                        <h2 className="text-2xl font-bold text-gray-800 mb-2">무엇을 도와드릴까요, 선생님?</h2>
                                        <p className="text-gray-500 text-sm mb-8">수업 주제나 필요한 성취기준, 시청각 자료를 질문해 보세요.</p>
                                        
                                        <div className="grid grid-cols-1 gap-3 w-full">
                                            <button onClick={() => setQuery("중학교 2학년 과학 '태양계의 구성' 단원 도입부 시청각 자료와 질문 3개 만들어줘")} className="p-4 bg-gray-50 hover:bg-gray-100 border rounded-2xl text-sm text-left text-gray-700 transition">
                                                "중학교 2학년 과학 '태양계의 구성' 단원 도입부 시청각 자료와 질문 3개 만들어줘"
                                            </button>
                                            <button onClick={() => setQuery("역사 '조선 후기 실학' 모둠 활동지 초안 짜줘")} className="p-4 bg-gray-50 hover:bg-gray-100 border rounded-2xl text-sm text-left text-gray-700 transition">
                                                "역사 '조선 후기 실학' 모둠 활동지 초안 짜줘"
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="max-w-3xl mx-auto space-y-6">
                                        {/* 사용자 질문 */}
                                        <div className="flex justify-end slide-up">
                                            <div className="bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none max-w-[80%] shadow-sm">
                                                <p className="text-sm">{query}</p>
                                            </div>
                                        </div>

                                        {/* 로딩 상태 */}
                                        {isGenerating && (
                                            <div className="flex items-start gap-4 fade-in">
                                                <div className="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center shrink-0 shadow-md">
                                                    <span className="text-white text-xs font-bold">AI</span>
                                                </div>
                                                <div className="bg-gray-50 border p-4 rounded-2xl rounded-tl-none flex items-center gap-3">
                                                    <div className="flex gap-1">
                                                        <div className="w-2 h-2 bg-blue-400 rounded-full animate-bounce" style={{animationDelay: '0ms'}}></div>
                                                        <div className="w-2 h-2 bg-blue-400 rounded-full animate-bounce" style={{animationDelay: '150ms'}}></div>
                                                        <div className="w-2 h-2 bg-blue-400 rounded-full animate-bounce" style={{animationDelay: '300ms'}}></div>
                                                    </div>
                                                    <span className="text-sm text-gray-500 font-medium">교육청 데이터 및 KBS 아카이브를 검색 중입니다...</span>
                                                </div>
                                            </div>
                                        )}

                                        {/* AI 답변 */}
                                        {showResult && (
                                            <div className="flex items-start gap-4 slide-up">
                                                <div className="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center shrink-0 shadow-md mt-1">
                                                    <span className="text-white text-xs font-bold">AI</span>
                                                </div>
                                                <div className="flex-1 space-y-4">
                                                    {/* 안전 알림 배지 */}
                                                    <div className="inline-flex items-center gap-1.5 bg-green-50 border border-green-200 text-green-700 px-3 py-1.5 rounded-full text-xs font-bold shadow-sm">
                                                        <i data-lucide="check-circle" className="w-3.5 h-3.5"></i>
                                                        교육청 승인 지식 및 KBS 검증 데이터 기반 답변
                                                    </div>

                                                    <div className="bg-white border p-6 rounded-2xl rounded-tl-none shadow-sm prose prose-sm max-w-none prose-blue">
                                                        <h3 className="text-lg font-bold text-gray-900 border-b pb-2 mb-4">🪐 중2 과학: 태양계의 구성 수업 설계안</h3>
                                                        
                                                        <p className="font-semibold text-gray-800">1. 수업 개요 및 성취기준</p>
                                                        <ul className="text-gray-600 mb-4">
                                                            <li><strong>성취기준:</strong> [9과04-01] 태양계를 구성하는 행성들의 특징을 비교할 수 있다.</li>
                                                            <li><strong>학습목표:</strong> 태양계 행성의 크기와 표면 특징을 설명하고, 지구의 고유한 환경을 이해한다.</li>
                                                        </ul>

                                                        <p className="font-semibold text-gray-800">2. 도입부 시청각 자료 활용 (KBS 콘텐츠)</p>
                                                        <p className="text-gray-600 mb-4">
                                                            우측 패널의 <strong>'KBS 스페셜: 우주대기행'</strong> 영상을 활용하여 학생들의 흥미를 유발합니다. 
                                                            특히 <span className="bg-blue-100 text-blue-800 px-1 rounded font-mono">15:30</span> 구간의 목성형 행성 그래픽을 보여주며 크기 차이를 체감하게 합니다.
                                                        </p>

                                                        <p className="font-semibold text-gray-800">3. 학생 발문 (질문 3가지)</p>
                                                        <ol className="text-gray-600">
                                                            <li>영상에서 지구와 가장 크기가 비슷한 행성은 무엇이었나요?</li>
                                                            <li>목성형 행성들이 지구형 행성에 비해 가벼운 기체로 이루어진 이유는 무엇일까요?</li>
                                                            <li>만약 우리가 화성에 간다면 가장 먼저 준비해야 할 것은 무엇일까요?</li>
                                                        </ol>
                                                    </div>

                                                    {/* 5. 하단 액션 버튼 */}
                                                    <div className="flex gap-2 pt-2">
                                                        <button className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 transition shadow-sm">
                                                            <i data-lucide="share-2" className="w-4 h-4"></i> 학생 배포용 변환 (Safe AI)
                                                        </button>
                                                        <button className="bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 transition shadow-sm">
                                                            <i data-lucide="download" className="w-4 h-4"></i> 지도안 내보내기 (PDF)
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                        <div ref={chatEndRef}></div>
                                    </div>
                                )}
                            </div>

                            {/* 하단 입력창 */}
                            <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white via-white to-transparent pt-10 pb-6 px-8">
                                <form onSubmit={handleSubmit} className="max-w-3xl mx-auto relative group flex items-end gap-2 bg-white border-2 border-gray-200 focus-within:border-blue-500 rounded-3xl p-2 shadow-lg transition-colors">
                                    <textarea 
                                        rows="1"
                                        className="w-full bg-transparent p-3 pl-4 focus:outline-none resize-none text-gray-700 max-h-32 placeholder-gray-400"
                                        placeholder="수업 주제나 필요한 성취기준, 영상 자료를 질문해 보세요."
                                        value={query}
                                        onChange={(e) => setQuery(e.target.value)}
                                        onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmit(e); } }}
                                    ></textarea>
                                    <button 
                                        type="submit"
                                        disabled={!query.trim() || isGenerating}
                                        className={`p-3 rounded-2xl shrink-0 transition ${query.trim() ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-md' : 'bg-gray-100 text-gray-400'}`}
                                    >
                                        <i data-lucide="send" className="w-5 h-5"></i>
                                    </button>
                                </form>
                                <p className="text-center text-xs text-gray-400 mt-3">AI가 생성한 내용은 수업 전 교사의 검토가 필요합니다.</p>
                            </div>
                        </main>

                        {/* 4. 우측 패널 (오픈북 근거 제시 영역) */}
                        <aside className={`w-80 md:w-96 bg-gray-50 border-l flex flex-col shrink-0 transition-all duration-300 ${showResult ? 'translate-x-0' : 'translate-x-full hidden'}`}>
                            <div className="p-4 border-b bg-white flex justify-between items-center z-10">
                                <h3 className="font-bold text-gray-800 flex items-center gap-2">
                                    <i data-lucide="book-open" className="w-5 h-5 text-blue-600"></i> 근거 자료 (Open Book)
                                </h3>
                            </div>
                            
                            {/* 탭 버튼 */}
                            <div className="flex border-b bg-white">
                                <button 
                                    onClick={() => setRightTab('video')}
                                    className={`flex-1 py-3 text-sm font-semibold text-center border-b-2 transition ${rightTab === 'video' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
                                >
                                    추천 시청각 자료
                                </button>
                                <button 
                                    onClick={() => setRightTab('doc')}
                                    className={`flex-1 py-3 text-sm font-semibold text-center border-b-2 transition ${rightTab === 'doc' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
                                >
                                    출처 문서 / 성취기준
                                </button>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                {rightTab === 'video' && (
                                    <div className="slide-up space-y-4">
                                        {/* 비디오 1 */}
                                        <div className="bg-white rounded-2xl border shadow-sm overflow-hidden group">
                                            {/* 가상 플레이어 썸네일 */}
                                            <div className="bg-gray-800 aspect-video relative flex items-center justify-center cursor-pointer">
                                                <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&q=80&w=400&h=225" className="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-80 transition" alt="space" />
                                                <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm group-hover:bg-white/30 transition z-10">
                                                    <i data-lucide="play" className="w-6 h-6 text-white ml-1"></i>
                                                </div>
                                                <span className="absolute bottom-2 right-2 bg-black/70 text-white text-[10px] px-1.5 py-0.5 rounded font-mono">45:00</span>
                                            </div>
                                            <div className="p-4">
                                                <div className="flex items-center gap-1.5 mb-1">
                                                    <span className="bg-red-100 text-red-600 text-[10px] font-bold px-1.5 py-0.5 rounded uppercase">KBS Archive</span>
                                                </div>
                                                <h4 className="font-bold text-gray-800 text-sm leading-tight mb-2">KBS 스페셜: 우주대기행 1부 - 태양계의 탄생</h4>
                                                
                                                {/* 타임스탬프 바로가기 */}
                                                <div className="bg-gray-50 rounded-lg p-2 border">
                                                    <p className="text-xs text-gray-500 mb-1 font-semibold">📍 관련 구간 (타임스탬프)</p>
                                                    <button className="w-full text-left flex items-center justify-between p-1.5 hover:bg-blue-50 rounded transition group/btn">
                                                        <span className="text-sm font-medium text-gray-700 group-hover/btn:text-blue-600">목성형 행성의 구조</span>
                                                        <span className="text-xs font-mono bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded">15:30 ~ 17:00</span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {rightTab === 'doc' && (
                                    <div className="slide-up space-y-3">
                                        {/* 문서 1 */}
                                        <div className="bg-white p-4 rounded-2xl border shadow-sm hover:border-blue-300 transition cursor-pointer">
                                            <div className="flex items-start gap-3">
                                                <div className="bg-blue-50 p-2 rounded-lg text-blue-600 shrink-0 mt-0.5">
                                                    <i data-lucide="file-text" className="w-5 h-5"></i>
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-gray-800 text-sm mb-1">2022 개정 교육과정 과학과 성취기준 해설서.pdf</h4>
                                                    <p className="text-xs text-gray-500 line-clamp-2 leading-relaxed">
                                                        ...[9과04-01] 태양계를 구성하는 행성들의 특징을 비교할 수 있다. 이 단원에서는 행성의 물리적 특성보다는...
                                                    </p>
                                                    <div className="mt-2 inline-flex items-center gap-1 text-xs font-medium text-blue-600 bg-blue-50 px-2 py-1 rounded">
                                                        <i data-lucide="search" className="w-3 h-3"></i> 142p 하이라이트 보기
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* 문서 2 */}
                                        <div className="bg-white p-4 rounded-2xl border shadow-sm hover:border-blue-300 transition cursor-pointer">
                                            <div className="flex items-start gap-3">
                                                <div className="bg-purple-50 p-2 rounded-lg text-purple-600 shrink-0 mt-0.5">
                                                    <i data-lucide="book" className="w-5 h-5"></i>
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-gray-800 text-sm mb-1">서울시교육청: 중등 과학 우수 수업 지도안 모음</h4>
                                                    <p className="text-xs text-gray-500 line-clamp-1">태양계 모형 만들기 프로젝트 활동지 포함</p>
                                                    <div className="mt-2 inline-flex items-center gap-1 text-xs font-medium text-purple-600 bg-purple-50 px-2 py-1 rounded">
                                                        <i data-lucide="external-link" className="w-3 h-3"></i> 45p 열람
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </aside>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide icons after render
        setTimeout(() => {
            lucide.createIcons();
        }, 100);
    </script>
</body>
</html>
