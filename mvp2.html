<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Edu RAG - 교사용 AI 튜터 MVP (결과 화면)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; overflow: hidden; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // 처음부터 결과가 보이도록 초기값 설정!
            const [query, setQuery] = useState("중학교 2학년 과학 '태양계의 구성' 단원 도입부 시청각 자료와 질문 3개 만들어줘");
            const [isGenerating, setIsGenerating] = useState(false);
            const [showResult, setShowResult] = useState(true); // true로 변경하여 4, 5번 영역 즉시 표시
            const [rightTab, setRightTab] = useState('video');
            const chatEndRef = useRef(null);

            // 상태(화면)가 바뀔 때마다 아이콘을 다시 그려주는 방어 로직
            useEffect(() => {
                if(window.lucide) {
                    window.lucide.createIcons();
                }
            }, [showResult, rightTab, isGenerating]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if(!query.trim()) return;
                
                setIsGenerating(true);
                setShowResult(false);
                
                setTimeout(() => {
                    setIsGenerating(false);
                    setShowResult(true);
                }, 1500);
            };

            return (
                <div className="flex flex-col h-screen">
                    {/* 1. 헤더 (상단 네비게이션 바) */}
                    <header className="h-16 bg-white border-b flex items-center justify-between px-6 shrink-0 z-10 relative shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 text-white p-1.5 rounded-lg font-black text-xl leading-none">K</div>
                            <span className="font-extrabold text-xl tracking-tight text-blue-900">K-Edu <span className="text-blue-500 font-medium text-sm ml-1">RAG AI 튜터</span></span>
                        </div>
                        <nav className="hidden md:flex gap-1 bg-gray-100 p-1 rounded-lg border">
                            <button className="px-4 py-1.5 bg-white text-blue-600 font-bold rounded shadow-sm text-sm">AI 튜터</button>
                            <button className="px-4 py-1.5 text-gray-500 hover:text-gray-900 font-medium rounded text-sm transition">지역 맞춤 학습</button>
                            <button className="px-4 py-1.5 text-gray-500 hover:text-gray-900 font-medium rounded text-sm transition flex items-center gap-1">세이프 AI 대시보드</button>
                        </nav>
                        <div className="flex items-center gap-3">
                            <div className="text-right hidden sm:block">
                                <p className="text-sm font-bold text-gray-800">김미영 선생님</p>
                                <p className="text-xs text-gray-500">서울중학교 · 중2 과학</p>
                            </div>
                            <div className="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold border border-blue-200">김</div>
                        </div>
                    </header>

                    {/* 메인 레이아웃 */}
                    <div className="flex flex-1 overflow-hidden">
                        
                        {/* 2. 좌측 패널 (사이드바 - 히스토리 및 관리) */}
                        <aside className="w-64 bg-gray-50 border-r flex flex-col shrink-0">
                            <div className="p-4">
                                <button 
                                    onClick={() => {setShowResult(false); setQuery('');}}
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl font-semibold flex items-center justify-center gap-2 transition shadow-sm"
                                >
                                    <i data-lucide="plus" className="w-4 h-4"></i> 새로운 수업 설계
                                </button>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 pt-0">
                                <p className="text-xs font-bold text-gray-400 mb-3 uppercase tracking-wider">최근 수업 기록</p>
                                <ul className="space-y-1">
                                    <li className="p-2.5 hover:bg-gray-200 rounded-lg cursor-pointer text-sm text-gray-700 flex items-center gap-2 font-medium bg-gray-200">
                                        <i data-lucide="message-square" className="w-4 h-4 text-gray-500"></i> 중2 과학 태양계
                                    </li>
                                    <li className="p-2.5 hover:bg-gray-200 rounded-lg cursor-pointer text-sm text-gray-700 flex items-center gap-2">
                                        <i data-lucide="message-square" className="w-4 h-4 text-gray-400"></i> 조선 후기 실학 활동지
                                    </li>
                                </ul>
                            </div>

                            <div className="p-4 border-t bg-gray-100">
                                <div className="bg-white p-3 rounded-xl border border-blue-100 shadow-sm flex items-start gap-2">
                                    <i data-lucide="shield-alert" className="w-4 h-4 text-blue-500 mt-0.5 shrink-0"></i>
                                    <div>
                                        <p className="text-xs font-bold text-gray-800">저작권/라이선스 가이드</p>
                                        <p className="text-[10px] text-gray-500 mt-1 leading-tight">본 플랫폼의 KBS 영상은 수업 목적의 교내 활용만 허용됩니다.</p>
                                    </div>
                                </div>
                            </div>
                        </aside>

                        {/* 3. 중앙 메인 화면 (AI 챗봇 영역) */}
                        <main className="flex-1 flex flex-col bg-white relative">
                            {/* 대화 영역 */}
                            <div className="flex-1 overflow-y-auto p-8 pb-32">
                                {!showResult && !isGenerating ? (
                                    <div className="h-full flex flex-col items-center justify-center text-center fade-in max-w-lg mx-auto">
                                        {/* 초기 화면 요소 (현재는 생략되어 바로 결과가 나옵니다) */}
                                    </div>
                                ) : (
                                    <div className="max-w-3xl mx-auto space-y-6">
                                        {/* 사용자 질문 */}
                                        <div className="flex justify-end slide-up">
                                            <div className="bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none max-w-[80%] shadow-sm">
                                                <p className="text-sm">{query}</p>
                                            </div>
                                        </div>

                                        {/* AI 답변 및 5번 하단 액션 버튼 */}
                                        {showResult && (
                                            <div className="flex items-start gap-4 slide-up">
                                                <div className="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center shrink-0 shadow-md mt-1">
                                                    <span className="text-white text-xs font-bold">AI</span>
                                                </div>
                                                <div className="flex-1 space-y-4">
                                                    {/* 안전 알림 배지 */}
                                                    <div className="inline-flex items-center gap-1.5 bg-green-50 border border-green-200 text-green-700 px-3 py-1.5 rounded-full text-xs font-bold shadow-sm">
                                                        <i data-lucide="check-circle" className="w-3.5 h-3.5"></i>
                                                        교육청 승인 지식 및 KBS 검증 데이터 기반 답변
                                                    </div>

                                                    <div className="bg-white border p-6 rounded-2xl rounded-tl-none shadow-sm prose prose-sm max-w-none prose-blue">
                                                        <h3 className="text-lg font-bold text-gray-900 border-b pb-2 mb-4">🪐 중2 과학: 태양계의 구성 수업 설계안</h3>
                                                        <p className="font-semibold text-gray-800">1. 수업 개요 및 성취기준</p>
                                                        <ul className="text-gray-600 mb-4">
                                                            <li><strong>성취기준:</strong> [9과04-01] 태양계를 구성하는 행성들의 특징을 비교할 수 있다.</li>
                                                        </ul>
                                                        <p className="font-semibold text-gray-800">2. 도입부 시청각 자료 활용 (KBS 콘텐츠)</p>
                                                        <p className="text-gray-600 mb-4">
                                                            우측 패널의 <strong>'KBS 스페셜: 우주대기행'</strong> 영상을 활용하여 흥미를 유발합니다. 
                                                            <span className="bg-blue-100 text-blue-800 px-1 rounded font-mono ml-1">15:30</span> 구간 그래픽을 시청하세요.
                                                        </p>
                                                    </div>

                                                    {/* [★ 5. 하단 액션 버튼 (활용 및 내보내기)] ★ */}
                                                    <div className="flex gap-2 pt-2 border-t border-dashed mt-4 pt-4">
                                                        <button className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition shadow-md">
                                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                                                            학생 배포용 변환 (Safe AI)
                                                        </button>
                                                        <button className="bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition shadow-sm">
                                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                                                            지도안 내보내기 (PDF)
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                        <div ref={chatEndRef}></div>
                                    </div>
                                )}
                            </div>

                            {/* 하단 입력창 */}
                            <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white via-white to-transparent pt-10 pb-6 px-8 z-20">
                                <form onSubmit={handleSubmit} className="max-w-3xl mx-auto relative group flex items-end gap-2 bg-white border-2 border-gray-200 focus-within:border-blue-500 rounded-3xl p-2 shadow-lg transition-colors">
                                    <textarea 
                                        rows="1"
                                        className="w-full bg-transparent p-3 pl-4 focus:outline-none resize-none text-gray-700 max-h-32 placeholder-gray-400"
                                        placeholder="수업 주제나 필요한 성취기준, 영상 자료를 질문해 보세요."
                                        value={query}
                                        onChange={(e) => setQuery(e.target.value)}
                                        onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmit(e); } }}
                                    ></textarea>
                                    <button 
                                        type="submit"
                                        className="p-3 rounded-2xl shrink-0 transition bg-blue-600 text-white hover:bg-blue-700 shadow-md"
                                    >
                                        <i data-lucide="send" className="w-5 h-5"></i>
                                    </button>
                                </form>
                            </div>
                        </main>

                        {/* [★ 4. 우측 패널 (가장 중요한 '오픈북 근거' 제시 영역)] ★ */}
                        {/* showResult 상태일 때 우측에서 슬라이드 되어 나타납니다. 초기값이 true이므로 바로 보입니다. */}
                        <aside className={`w-80 md:w-96 bg-blue-50/50 border-l border-blue-100 flex flex-col shrink-0 transition-all duration-300 z-10 ${showResult ? 'translate-x-0' : 'translate-x-full hidden'}`}>
                            <div className="p-4 border-b bg-white flex justify-between items-center z-10 shadow-sm">
                                <h3 className="font-extrabold text-blue-900 flex items-center gap-2">
                                    <i data-lucide="book-open" className="w-5 h-5 text-blue-600"></i> 근거 자료 (Open Book)
                                </h3>
                                <span className="text-[10px] bg-blue-100 text-blue-600 px-2 py-1 rounded font-bold">RAG Engine</span>
                            </div>
                            
                            {/* 탭 버튼 */}
                            <div className="flex border-b bg-white">
                                <button 
                                    onClick={() => setRightTab('video')}
                                    className={`flex-1 py-3 text-sm font-bold text-center border-b-2 transition ${rightTab === 'video' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
                                >
                                    추천 시청각 자료
                                </button>
                                <button 
                                    onClick={() => setRightTab('doc')}
                                    className={`flex-1 py-3 text-sm font-bold text-center border-b-2 transition ${rightTab === 'doc' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
                                >
                                    출처 및 성취기준
                                </button>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                {rightTab === 'video' && (
                                    <div className="slide-up space-y-4">
                                        <div className="bg-white rounded-2xl border border-blue-200 shadow-md overflow-hidden group">
                                            {/* 가상 플레이어 썸네일 */}
                                            <div className="bg-gray-800 aspect-video relative flex items-center justify-center cursor-pointer">
                                                <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&q=80&w=400&h=225" className="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-80 transition" alt="space" />
                                                <div className="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center shadow-lg group-hover:scale-110 transition z-10">
                                                    <i data-lucide="play" className="w-6 h-6 text-white ml-1"></i>
                                                </div>
                                                <span className="absolute bottom-2 right-2 bg-black/80 text-white text-[10px] px-1.5 py-0.5 rounded font-mono">45:00</span>
                                            </div>
                                            <div className="p-4">
                                                <div className="flex items-center gap-1.5 mb-2">
                                                    <span className="bg-red-50 text-red-600 border border-red-200 text-[10px] font-extrabold px-1.5 py-0.5 rounded uppercase">KBS Archive</span>
                                                </div>
                                                <h4 className="font-bold text-gray-900 text-sm leading-tight mb-3">KBS 스페셜: 우주대기행 1부 - 태양계의 탄생</h4>
                                                
                                                {/* 타임스탬프 바로가기 */}
                                                <div className="bg-blue-50 rounded-lg p-2.5 border border-blue-100">
                                                    <p className="text-xs text-blue-800 mb-1 font-bold flex items-center gap-1">
                                                        <i data-lucide="clock" className="w-3 h-3"></i> 타임스탬프 바로가기
                                                    </p>
                                                    <button className="w-full text-left flex items-center justify-between p-2 bg-white hover:bg-blue-100 border border-blue-200 rounded transition group/btn shadow-sm">
                                                        <span className="text-sm font-bold text-gray-800 group-hover/btn:text-blue-700">목성형 행성의 구조</span>
                                                        <span className="text-xs font-mono font-bold bg-blue-600 text-white px-2 py-0.5 rounded">15:30 ~ 17:00</span>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {rightTab === 'doc' && (
                                    <div className="slide-up space-y-3">
                                        <div className="bg-white p-4 rounded-2xl border border-blue-200 shadow-md hover:border-blue-400 transition cursor-pointer">
                                            <div className="flex items-start gap-3">
                                                <div className="bg-blue-100 p-2.5 rounded-lg text-blue-700 shrink-0 mt-0.5 shadow-sm">
                                                    <i data-lucide="file-text" className="w-5 h-5"></i>
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-gray-900 text-sm mb-1">2022 개정 교육과정 과학과 해설서.pdf</h4>
                                                    <p className="text-xs text-gray-600 line-clamp-2 leading-relaxed">
                                                        ...<mark className="bg-yellow-200 px-1 font-bold text-gray-900">[9과04-01] 태양계를 구성하는 행성들의 특징</mark>을 비교할 수 있다...
                                                    </p>
                                                    <div className="mt-3 inline-flex items-center gap-1 text-xs font-bold text-white bg-blue-600 px-3 py-1.5 rounded shadow-sm hover:bg-blue-700">
                                                        <i data-lucide="search" className="w-3 h-3"></i> 142p 원문 열람하기
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </aside>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
