<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Edu RAG - AI 튜터 & 세이프 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; overflow: hidden; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* 토글 스위치 스타일 */
        .toggle-checkbox:checked { right: 0; border-color: #2563EB; }
        .toggle-checkbox:checked + .toggle-label { background-color: #2563EB; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // 네비게이션 뷰 상태 ('tutor' | 'dashboard')
            const [currentView, setCurrentView] = useState('tutor');

            // --- AI 튜터용 상태 ---
            const [query, setQuery] = useState("중학교 2학년 과학 '태양계의 구성' 단원 도입부 시청각 자료와 질문 3개 만들어줘");
            const [isGenerating, setIsGenerating] = useState(false);
            const [showResult, setShowResult] = useState(true); 
            const [rightTab, setRightTab] = useState('video');
            const chatEndRef = useRef(null);

            // --- 세이프 대시보드용 상태 ---
            const [dashTab, setDashTab] = useState('main'); // main, logs, control, report

            // 상태(화면)가 바뀔 때마다 아이콘을 다시 그려주는 로직
            useEffect(() => {
                if(window.lucide) {
                    window.lucide.createIcons();
                }
            }, [currentView, showResult, rightTab, isGenerating, dashTab]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if(!query.trim()) return;
                setIsGenerating(true);
                setShowResult(false);
                setTimeout(() => {
                    setIsGenerating(false);
                    setShowResult(true);
                }, 1500);
            };

            return (
                <div className="flex flex-col h-screen">
                    {/* 1. 글로벌 헤더 (상단 네비게이션 바) */}
                    <header className="h-16 bg-white border-b flex items-center justify-between px-6 shrink-0 z-20 relative shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 text-white p-1.5 rounded-lg font-black text-xl leading-none">K</div>
                            <span className="font-extrabold text-xl tracking-tight text-blue-900">K-Edu <span className="text-blue-500 font-medium text-sm ml-1">RAG Platform</span></span>
                        </div>
                        <nav className="hidden md:flex gap-1 bg-gray-100 p-1 rounded-lg border">
                            <button 
                                onClick={() => setCurrentView('tutor')}
                                className={`px-4 py-1.5 font-bold rounded text-sm transition ${currentView === 'tutor' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-900'}`}
                            >AI 튜터</button>
                            <button className="px-4 py-1.5 text-gray-500 hover:text-gray-900 font-medium rounded text-sm transition">지역 맞춤 학습</button>
                            <button 
                                onClick={() => setCurrentView('dashboard')}
                                className={`px-4 py-1.5 font-bold rounded text-sm transition flex items-center gap-1.5 ${currentView === 'dashboard' ? 'bg-slate-800 text-white shadow-sm' : 'text-gray-500 hover:text-gray-900'}`}
                            >
                                <i data-lucide="shield-check" className="w-4 h-4"></i> 세이프 AI 대시보드
                            </button>
                        </nav>
                        <div className="flex items-center gap-3">
                            <div className="text-right hidden sm:block">
                                <p className="text-sm font-bold text-gray-800">김미영 선생님</p>
                                <p className="text-xs text-gray-500">서울중학교 · 관리자</p>
                            </div>
                            <div className="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold border border-blue-200">김</div>
                        </div>
                    </header>

                    {/* --- 뷰 라우팅 --- */}
                    <div className="flex flex-1 overflow-hidden relative">
                        
                        {/* ========================================== */}
                        {/* VIEW 1: 교사용 AI 튜터 (기존 화면) */}
                        {/* ========================================== */}
                        {currentView === 'tutor' && (
                            <div className="flex flex-1 w-full h-full fade-in">
                                {/* 좌측 패널 (사이드바) */}
                                <aside className="w-64 bg-gray-50 border-r flex flex-col shrink-0">
                                    <div className="p-4">
                                        <button onClick={() => {setShowResult(false); setQuery('');}} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl font-semibold flex items-center justify-center gap-2 transition shadow-sm">
                                            <i data-lucide="plus" className="w-4 h-4"></i> 새로운 수업 설계
                                        </button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-4 pt-0">
                                        <p className="text-xs font-bold text-gray-400 mb-3 uppercase tracking-wider">최근 수업 기록</p>
                                        <ul className="space-y-1">
                                            <li className="p-2.5 hover:bg-gray-200 rounded-lg cursor-pointer text-sm text-gray-700 flex items-center gap-2 font-medium bg-gray-200">
                                                <i data-lucide="message-square" className="w-4 h-4 text-gray-500"></i> 중2 과학 태양계
                                            </li>
                                        </ul>
                                    </div>
                                    <div className="p-4 border-t bg-gray-100">
                                        <div className="bg-white p-3 rounded-xl border border-blue-100 shadow-sm flex items-start gap-2">
                                            <i data-lucide="shield-alert" className="w-4 h-4 text-blue-500 mt-0.5 shrink-0"></i>
                                            <div>
                                                <p className="text-xs font-bold text-gray-800">저작권 가이드</p>
                                                <p className="text-[10px] text-gray-500 mt-1 leading-tight">수업 목적의 교내 활용만 허용.</p>
                                            </div>
                                        </div>
                                    </div>
                                </aside>

                                {/* 중앙 메인 화면 (AI 챗봇) */}
                                <main className="flex-1 flex flex-col bg-white relative">
                                    <div className="flex-1 overflow-y-auto p-8 pb-32">
                                        <div className="max-w-3xl mx-auto space-y-6">
                                            <div className="flex justify-end slide-up">
                                                <div className="bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none max-w-[80%] shadow-sm"><p className="text-sm">{query}</p></div>
                                            </div>
                                            {showResult && (
                                                <div className="flex items-start gap-4 slide-up">
                                                    <div className="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center shrink-0 shadow-md mt-1">
                                                        <span className="text-white text-xs font-bold">AI</span>
                                                    </div>
                                                    <div className="flex-1 space-y-4">
                                                        <div className="inline-flex items-center gap-1.5 bg-green-50 border border-green-200 text-green-700 px-3 py-1.5 rounded-full text-xs font-bold shadow-sm">
                                                            <i data-lucide="check-circle" className="w-3.5 h-3.5"></i>교육청 승인 지식 및 KBS 검증 데이터 기반
                                                        </div>
                                                        <div className="bg-white border p-6 rounded-2xl rounded-tl-none shadow-sm prose prose-sm max-w-none prose-blue">
                                                            <h3 className="text-lg font-bold text-gray-900 border-b pb-2 mb-4">🪐 중2 과학: 태양계의 구성 수업 설계안</h3>
                                                            <p className="font-semibold text-gray-800">1. 수업 개요 및 성취기준</p>
                                                            <ul className="text-gray-600 mb-4"><li><strong>성취기준:</strong> [9과04-01] 태양계 행성 비교</li></ul>
                                                            <p className="font-semibold text-gray-800">2. 도입부 시청각 자료 (KBS 콘텐츠)</p>
                                                            <p className="text-gray-600">우측 <strong>'KBS 스페셜: 우주대기행'</strong> <span className="bg-blue-100 text-blue-800 px-1 rounded font-mono ml-1">15:30</span> 구간 활용.</p>
                                                        </div>
                                                        <div className="flex gap-2 pt-2 border-t border-dashed mt-4 pt-4">
                                                            <button className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 shadow-md">
                                                                <i data-lucide="share-2" className="w-4 h-4"></i> 학생 배포용 변환
                                                            </button>
                                                            <button className="bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 shadow-sm">
                                                                <i data-lucide="download" className="w-4 h-4"></i> 지도안 내보내기
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                            <div ref={chatEndRef}></div>
                                        </div>
                                    </div>
                                    <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white via-white to-transparent pt-10 pb-6 px-8 z-20">
                                        <form onSubmit={handleSubmit} className="max-w-3xl mx-auto relative flex items-end gap-2 bg-white border-2 border-gray-200 focus-within:border-blue-500 rounded-3xl p-2 shadow-lg">
                                            <textarea rows="1" className="w-full bg-transparent p-3 pl-4 focus:outline-none resize-none text-gray-700 max-h-32" value={query} onChange={(e) => setQuery(e.target.value)}></textarea>
                                            <button type="submit" className="p-3 rounded-2xl shrink-0 bg-blue-600 text-white shadow-md"><i data-lucide="send" className="w-5 h-5"></i></button>
                                        </form>
                                    </div>
                                </main>

                                {/* 우측 패널 (오픈북 근거) */}
                                <aside className={`w-80 md:w-96 bg-blue-50/50 border-l border-blue-100 flex flex-col shrink-0 z-10 transition-all duration-300 ${showResult ? 'translate-x-0' : 'translate-x-full hidden'}`}>
                                    <div className="p-4 border-b bg-white flex justify-between items-center shadow-sm">
                                        <h3 className="font-extrabold text-blue-900 flex items-center gap-2"><i data-lucide="book-open" className="w-5 h-5 text-blue-600"></i> 근거 자료 (Open Book)</h3>
                                    </div>
                                    <div className="flex border-b bg-white">
                                        <button onClick={() => setRightTab('video')} className={`flex-1 py-3 text-sm font-bold border-b-2 ${rightTab === 'video' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500'}`}>시청각 자료</button>
                                        <button onClick={() => setRightTab('doc')} className={`flex-1 py-3 text-sm font-bold border-b-2 ${rightTab === 'doc' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500'}`}>출처 및 성취기준</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-4">
                                        {rightTab === 'video' && (
                                            <div className="bg-white rounded-2xl border border-blue-200 shadow-md overflow-hidden group">
                                                <div className="bg-gray-800 aspect-video relative flex items-center justify-center">
                                                    <img src="https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&q=80&w=400&h=225" className="absolute inset-0 w-full h-full object-cover opacity-60" alt="space" />
                                                    <div className="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center z-10"><i data-lucide="play" className="w-6 h-6 text-white ml-1"></i></div>
                                                </div>
                                                <div className="p-4">
                                                    <span className="bg-red-50 text-red-600 border border-red-200 text-[10px] font-extrabold px-1.5 py-0.5 rounded uppercase mb-2 inline-block">KBS Archive</span>
                                                    <h4 className="font-bold text-gray-900 text-sm mb-3">KBS 스페셜: 우주대기행 1부</h4>
                                                    <div className="bg-blue-50 rounded-lg p-2.5 border border-blue-100">
                                                        <button className="w-full text-left flex items-center justify-between p-2 bg-white hover:bg-blue-100 border border-blue-200 rounded shadow-sm">
                                                            <span className="text-sm font-bold text-gray-800">목성형 행성의 구조</span>
                                                            <span className="text-xs font-mono font-bold bg-blue-600 text-white px-2 py-0.5 rounded">15:30 ~ 17:00</span>
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                        {rightTab === 'doc' && (
                                            <div className="bg-white p-4 rounded-2xl border border-blue-200 shadow-md">
                                                <h4 className="font-bold text-gray-900 text-sm mb-1">2022 개정 과학과 해설서.pdf</h4>
                                                <p className="text-xs text-gray-600">...<mark className="bg-yellow-200 px-1 font-bold">[9과04-01] 태양계 행성 특징</mark>...</p>
                                            </div>
                                        )}
                                    </div>
                                </aside>
                            </div>
                        )}

                        {/* ========================================== */}
                        {/* VIEW 2: BM-2 세이프 AI 대시보드 */}
                        {/* ========================================== */}
                        {currentView === 'dashboard' && (
                            <div className="flex flex-1 w-full h-full bg-slate-50 fade-in">
                                {/* 대시보드 사이드바 */}
                                <aside className="w-64 bg-slate-900 text-slate-300 flex flex-col shrink-0">
                                    <div className="p-6 pb-2">
                                        <h2 className="text-white font-bold tracking-widest text-xs uppercase opacity-50 mb-4">Governance</h2>
                                        <nav className="space-y-2">
                                            <button onClick={() => setDashTab('main')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition ${dashTab === 'main' ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-slate-800 hover:text-white'}`}>
                                                <i data-lucide="layout-dashboard" className="w-5 h-5"></i> 1. 통합 모니터링
                                            </button>
                                            <button onClick={() => setDashTab('logs')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition ${dashTab === 'logs' ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-slate-800 hover:text-white'}`}>
                                                <i data-lucide="list-video" className="w-5 h-5"></i> 2. 학생 AI 사용 로그
                                            </button>
                                            <button onClick={() => setDashTab('control')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition ${dashTab === 'control' ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-slate-800 hover:text-white'}`}>
                                                <i data-lucide="sliders" className="w-5 h-5"></i> 3. 안전 제어 설정
                                            </button>
                                            <button onClick={() => setDashTab('reports')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition ${dashTab === 'reports' ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-slate-800 hover:text-white'}`}>
                                                <i data-lucide="bar-chart-3" className="w-5 h-5"></i> 4. 성과 측정 리포트
                                            </button>
                                        </nav>
                                    </div>
                                    <div className="mt-auto p-6">
                                        <div className="bg-slate-800 p-4 rounded-xl border border-slate-700">
                                            <div className="flex items-center gap-2 text-green-400 mb-1">
                                                <div className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                                                <span className="text-xs font-bold uppercase tracking-wider">Gateway Active</span>
                                            </div>
                                            <p className="text-[10px] text-slate-400">Naver Cloud Platform 연동 중</p>
                                        </div>
                                    </div>
                                </aside>

                                {/* 대시보드 메인 콘텐츠 */}
                                <main className="flex-1 overflow-y-auto p-8">
                                    
                                    {/* 1. 통합 모니터링 홈 */}
                                    {dashTab === 'main' && (
                                        <div className="max-w-6xl mx-auto space-y-6 slide-up">
                                            <header className="mb-8">
                                                <h1 className="text-2xl font-extrabold text-slate-900">통합 모니터링 홈</h1>
                                                <p className="text-slate-500">우리 학교 학생들의 AI 활용 현황과 보안 위협을 실시간으로 확인합니다.</p>
                                            </header>
                                            
                                            {/* Top Stats */}
                                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                                    <p className="text-sm font-semibold text-slate-500 mb-2">현재 접속 중인 학생</p>
                                                    <p className="text-3xl font-black text-blue-600">142<span className="text-base font-medium text-slate-400 ml-1">명</span></p>
                                                </div>
                                                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                                    <p className="text-sm font-semibold text-slate-500 mb-2">금일 RAG 질의응답</p>
                                                    <p className="text-3xl font-black text-slate-800">1,845<span className="text-base font-medium text-slate-400 ml-1">건</span></p>
                                                </div>
                                                <div className="bg-red-50 p-6 rounded-2xl border border-red-100 shadow-sm relative overflow-hidden">
                                                    <div className="absolute right-[-10px] top-[-10px] opacity-10 text-red-500"><i data-lucide="shield-alert" className="w-32 h-32"></i></div>
                                                    <p className="text-sm font-bold text-red-600 mb-2 flex items-center gap-1"><i data-lucide="alert-triangle" className="w-4 h-4"></i> 보안 위협 (Zero Trust)</p>
                                                    <p className="text-3xl font-black text-red-600">3<span className="text-base font-medium text-red-400 ml-1">건 차단됨</span></p>
                                                </div>
                                                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                                    <p className="text-sm font-semibold text-slate-500 mb-2">시스템 안정성 상태</p>
                                                    <div className="flex items-center gap-2">
                                                        <span className="bg-green-100 text-green-700 px-3 py-1 rounded-lg text-sm font-bold border border-green-200">정상 (Traffic 42%)</span>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Charts / Alerts Placeholder */}
                                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">
                                                <div className="lg:col-span-2 bg-white border border-slate-200 rounded-3xl p-6 shadow-sm min-h-[300px] flex flex-col">
                                                    <h3 className="font-bold text-slate-800 mb-4">주간 통합 RAG 질의 트렌드</h3>
                                                    <div className="flex-1 bg-slate-50 rounded-xl border border-dashed border-slate-300 flex items-center justify-center text-slate-400 text-sm">
                                                        [그래프 영역: KBS/교육청 데이터 활용량 차트 표출]
                                                    </div>
                                                </div>
                                                <div className="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm">
                                                    <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="bell-ring" className="w-5 h-5 text-red-500"></i> 실시간 안전 알림</h3>
                                                    <ul className="space-y-3">
                                                        <li className="bg-red-50 border-l-4 border-red-500 p-3 rounded text-sm">
                                                            <p className="font-bold text-red-700 mb-0.5">유해 검색어 시도</p>
                                                            <p className="text-slate-600 text-xs">2학년 3반 (IP: 192.***.12) - "게임 핵 다운로드" 차단</p>
                                                        </li>
                                                        <li className="bg-orange-50 border-l-4 border-orange-500 p-3 rounded text-sm">
                                                            <p className="font-bold text-orange-700 mb-0.5">개인정보 입력 감지</p>
                                                            <p className="text-slate-600 text-xs">1학년 1반 - 주민등록번호 형식 마스킹 처리됨</p>
                                                        </li>
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* 2. 학생 AI 사용 모니터링 (Zero Trust) */}
                                    {dashTab === 'logs' && (
                                        <div className="max-w-6xl mx-auto space-y-6 slide-up">
                                            <header className="mb-6 flex justify-between items-end">
                                                <div>
                                                    <h1 className="text-2xl font-extrabold text-slate-900">학생 AI 사용 모니터링</h1>
                                                    <p className="text-slate-500">KBS 데이터 및 표준 ID 체계가 연동된 '무논란' 상세 대화 로그.</p>
                                                </div>
