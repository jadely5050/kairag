<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Edu RAG - 통합 RAG 플랫폼 MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; overflow: hidden; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* 토글 스위치 스타일 */
        .toggle-checkbox:checked { right: 0; border-color: #2563EB; }
        .toggle-checkbox:checked + .toggle-label { background-color: #2563EB; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // 네비게이션 뷰 상태 ('tutor' | 'regional' | 'dashboard')
            const [currentView, setCurrentView] = useState('regional');

            // --- 1. AI 튜터용 상태 ---
            const [query, setQuery] = useState("중학교 2학년 과학 '태양계의 구성' 단원 도입부 시청각 자료와 질문 3개 만들어줘");
            const [isGenerating, setIsGenerating] = useState(false);
            const [showResult, setShowResult] = useState(true); 
            const [rightTab, setRightTab] = useState('video');
            const chatEndRef = useRef(null);

            // --- 2. 지역 맞춤 학습용 상태 ---
            const [regionalPersona, setRegionalPersona] = useState('student'); // 'student' | 'parent'
            const [regionalQuery, setRegionalQuery] = useState('');
            const [isRegionalGenerating, setIsRegionalGenerating] = useState(false);
            const [showRegionalResult, setShowRegionalResult] = useState(true);
            const [regionalRightTab, setRegionalRightTab] = useState('video');
            const regionalChatEndRef = useRef(null);

            // --- 3. 세이프 대시보드용 상태 ---
            const [dashTab, setDashTab] = useState('main'); // main, logs, control, reports

            // 페르소나 변경 시 지역 맞춤 학습 시나리오 자동 세팅
            useEffect(() => {
                setShowRegionalResult(false);
                setTimeout(() => {
                    if (regionalPersona === 'student') {
                        setRegionalQuery("화산 폭발의 원리가 뭐야?");
                        setRegionalRightTab('video');
                    } else {
                        setRegionalQuery("우리 지역 초등학교 늘봄학교(돌봄교실) 신청 언제야?");
                        setRegionalRightTab('doc');
                    }
                    setShowRegionalResult(true);
                }, 300);
            }, [regionalPersona]);

            // 아이콘 렌더링
            useEffect(() => {
                if(window.lucide) {
                    window.lucide.createIcons();
                }
            }, [currentView, showResult, rightTab, isGenerating, dashTab, regionalPersona, showRegionalResult, regionalRightTab]);

            // 스크롤 이동
            useEffect(() => {
                if (showResult && chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                if (showRegionalResult && regionalChatEndRef.current) regionalChatEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [showResult, showRegionalResult]);

            const handleTutorSubmit = (e) => {
                e.preventDefault();
                if(!query.trim()) return;
                setIsGenerating(true); setShowResult(false);
                setTimeout(() => { setIsGenerating(false); setShowResult(true); }, 1500);
            };

            const handleRegionalSubmit = (e) => {
                e.preventDefault();
                if(!regionalQuery.trim()) return;
                setIsRegionalGenerating(true); setShowRegionalResult(false);
                setTimeout(() => { setIsRegionalGenerating(false); setShowRegionalResult(true); }, 1500);
            };

            return (
                <div className="flex flex-col h-screen">
                    {/* 1. 글로벌 헤더 */}
                    <header className="h-16 bg-white border-b flex items-center justify-between px-6 shrink-0 z-20 relative shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 text-white p-1.5 rounded-lg font-black text-xl leading-none">K</div>
                            <span className="font-extrabold text-xl tracking-tight text-blue-900">K-Edu <span className="text-blue-500 font-medium text-sm ml-1">RAG Platform</span></span>
                        </div>
                        <nav className="hidden md:flex gap-1 bg-gray-100 p-1 rounded-lg border">
                            <button onClick={() => setCurrentView('tutor')} className={`px-4 py-1.5 font-bold rounded text-sm transition ${currentView === 'tutor' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-900'}`}>AI 튜터</button>
                            <button onClick={() => setCurrentView('regional')} className={`px-4 py-1.5 font-bold rounded text-sm transition ${currentView === 'regional' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-900'}`}>지역 맞춤 학습 / 상담</button>
                            <button onClick={() => setCurrentView('dashboard')} className={`px-4 py-1.5 font-bold rounded text-sm transition flex items-center gap-1.5 ${currentView === 'dashboard' ? 'bg-slate-800 text-white shadow-sm' : 'text-gray-500 hover:text-gray-900'}`}><i data-lucide="shield-check" className="w-4 h-4"></i> 세이프 대시보드</button>
                        </nav>
                        <div className="flex items-center gap-3">
                            {currentView === 'regional' ? (
                                <div className="text-right hidden sm:block">
                                    <p className="text-sm font-bold text-gray-800">{regionalPersona === 'student' ? '이학생' : '이학부모'}</p>
                                    <p className="text-xs text-blue-600 font-bold bg-blue-50 px-2 rounded-full inline-block mt-0.5">서울 마포구</p>
                                </div>
                            ) : (
                                <div className="text-right hidden sm:block">
                                    <p className="text-sm font-bold text-gray-800">김미영 선생님</p>
                                    <p className="text-xs text-gray-500">서울중학교</p>
                                </div>
                            )}
                            <div className="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold border border-blue-200">
                                {currentView === 'regional' ? '이' : '김'}
                            </div>
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden relative">
                        
                        {/* ========================================== */}
                        {/* VIEW 1: 교사용 AI 튜터 (기존 코드 요약) */}
                        {/* ========================================== */}
                        {currentView === 'tutor' && (
                            <div className="flex flex-1 w-full h-full fade-in">
                                {/* 좌측 패널 */}
                                <aside className="w-64 bg-gray-50 border-r flex flex-col shrink-0">
                                    <div className="p-4"><button onClick={() => {setShowResult(false); setQuery('');}} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl font-semibold flex items-center justify-center gap-2 shadow-sm"><i data-lucide="plus" className="w-4 h-4"></i> 새로운 수업 설계</button></div>
                                    <div className="flex-1 p-4 pt-0"><p className="text-xs font-bold text-gray-400 mb-3 uppercase">최근 수업 기록</p><ul className="space-y-1"><li className="p-2.5 rounded-lg text-sm text-gray-700 flex items-center gap-2 font-medium bg-gray-200"><i data-lucide="message-square" className="w-4 h-4 text-gray-500"></i> 중2 과학 태양계</li></ul></div>
                                </aside>
                                {/* 중앙 메인 */}
                                <main className="flex-1 flex flex-col bg-white relative">
                                    <div className="flex-1 overflow-y-auto p-8 pb-32">
                                        <div className="max-w-3xl mx-auto space-y-6">
                                            <div className="flex justify-end slide-up"><div className="bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none max-w-[80%] shadow-sm"><p className="text-sm">{query}</p></div></div>
                                            {showResult && (
                                                <div className="flex items-start gap-4 slide-up">
                                                    <div className="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center shrink-0 mt-1"><span className="text-white text-xs font-bold">AI</span></div>
                                                    <div className="flex-1 space-y-4">
                                                        <div className="inline-flex items-center gap-1.5 bg-green-50 border border-green-200 text-green-700 px-3 py-1.5 rounded-full text-xs font-bold"><i data-lucide="check-circle" className="w-3.5 h-3.5"></i>교육청 및 KBS 검증 데이터 기반</div>
                                                        <div className="bg-white border p-6 rounded-2xl rounded-tl-none shadow-sm prose prose-sm max-w-none prose-blue">
                                                            <h3 className="text-lg font-bold border-b pb-2 mb-4">🪐 중2 과학: 태양계의 구성 수업 설계안</h3>
                                                            <p>1. <strong>성취기준:</strong> [9과04-01] 태양계 행성 비교</p>
                                                            <p>2. 우측 <strong>'우주대기행'</strong> <span className="bg-blue-100 text-blue-800 px-1 rounded font-mono">15:30</span> 구간 활용.</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                            <div ref={chatEndRef}></div>
                                        </div>
                                    </div>
                                    <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white via-white to-transparent pt-10 pb-6 px-8 z-20">
                                        <form onSubmit={handleTutorSubmit} className="max-w-3xl mx-auto flex items-end gap-2 bg-white border-2 border-gray-200 focus-within:border-blue-500 rounded-3xl p-2 shadow-lg"><textarea rows="1" className="w-full bg-transparent p-3 pl-4 focus:outline-none resize-none text-gray-700" value={query} onChange={(e) => setQuery(e.target.value)}></textarea><button type="submit" className="p-3 rounded-2xl bg-blue-600 text-white"><i data-lucide="send" className="w-5 h-5"></i></button></form>
                                    </div>
                                </main>
                                {/* 우측 패널 */}
                                <aside className={`w-80 md:w-96 bg-blue-50/50 border-l border-blue-100 flex flex-col shrink-0 z-10 transition-all ${showResult ? 'translate-x-0' : 'hidden'}`}>
                                    <div className="p-4 border-b bg-white flex justify-between items-center shadow-sm"><h3 className="font-extrabold text-blue-900 flex items-center gap-2"><i data-lucide="book-open" className="w-5 h-5"></i> 근거 자료</h3></div>
                                    <div className="flex-1 p-4"><div className="bg-white rounded-2xl border shadow-md overflow-hidden"><div className="bg-gray-800 aspect-video flex items-center justify-center"><i data-lucide="play" className="w-10 h-10 text-white/50"></i></div><div className="p-4"><span className="bg-red-50 text-red-600 text-[10px] font-extrabold px-1.5 py-0.5 rounded uppercase mb-2 inline-block">KBS Archive</span><h4 className="font-bold text-sm mb-3">KBS 스페셜: 우주대기행</h4></div></div></div>
                                </aside>
                            </div>
                        )}

                        {/* ========================================== */}
                        {/* VIEW 2: 지역 맞춤 학습/상담 (학생 및 학부모 MVP) */}
                        {/* ========================================== */}
                        {currentView === 'regional' && (
                            <div className="flex flex-1 w-full h-full bg-white fade-in">
                                {/* 좌측 패널 (개인화 영역) */}
                                <aside className="w-72 bg-gray-50 border-r flex flex-col shrink-0">
                                    <div className="p-6 border-b bg-white">
                                        <h2 className="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">👤 사용자 모드 전환</h2>
                                        <div className="flex bg-gray-100 p-1 rounded-xl">
                                            <button onClick={() => setRegionalPersona('student')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition ${regionalPersona === 'student' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>학생 모드</button>
                                            <button onClick={() => setRegionalPersona('parent')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition ${regionalPersona === 'parent' ? 'bg-white text-emerald-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>학부모 모드</button>
                                        </div>
                                    </div>
                                    
                                    <div className="p-6 border-b">
                                        <h2 className="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">📍 나의 지역 설정</h2>
                                        <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                                            <div className="flex items-center gap-2 text-gray-800 font-bold mb-1"><i data-lucide="map-pin" className="w-4 h-4 text-blue-500"></i> 서울특별시 마포구</div>
                                            <div className="flex items-center gap-2 text-gray-600 text-sm"><i data-lucide="school" className="w-4 h-4 text-gray-400"></i> 서울초등학교</div>
                                        </div>
                                    </div>

                                    <div className="flex-1 overflow-y-auto p-6 bg-gray-50">
                                        <h2 className="text-sm font-bold text-gray-500 mb-4 uppercase tracking-wider flex items-center gap-2"><i data-lucide="sparkles" className="w-4 h-4 text-yellow-500"></i> 지역 맞춤 추천</h2>
                                        
                                        {regionalPersona === 'student' ? (
                                            <div className="space-y-3 slide-up">
                                                <div className="bg-white p-3.5 rounded-xl border border-blue-100 shadow-sm cursor-pointer hover:border-blue-300 transition">
                                                    <span className="bg-blue-50 text-blue-600 text-[10px] font-extrabold px-1.5 py-0.5 rounded uppercase mb-1.5 inline-block">이번주 인기 탐구</span>
                                                    <p className="font-bold text-gray-800 text-sm leading-tight">조선시대 임진왜란의 영웅들 ⚔️</p>
                                                    <p className="text-xs text-gray-500 mt-1">KBS 역사저널 그날 추천 영상</p>
                                                </div>
                                                <div className="bg-white p-3.5 rounded-xl border border-indigo-100 shadow-sm cursor-pointer hover:border-indigo-300 transition">
                                                    <span className="bg-indigo-50 text-indigo-600 text-[10px] font-extrabold px-1.5 py-0.5 rounded uppercase mb-1.5 inline-block">마포구 교육청</span>
                                                    <p className="font-bold text-gray-800 text-sm leading-tight">주말 AI 로봇 코딩 캠프 안내 🤖</p>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="space-y-3 slide-up">
                                                <div className="bg-white p-3.5 rounded-xl border border-emerald-100 shadow-sm cursor-pointer hover:border-emerald-300 transition">
                                                    <span className="bg-emerald-50 text-emerald-600 text-[10px] font-extrabold px-1.5 py-0.5 rounded uppercase mb-1.5 inline-block">학교 중요 공지</span>
                                                    <p className="font-bold text-gray-800 text-sm leading-tight">1학기 방과후학교 수강 신청 안내 📢</p>
                                                    <p className="text-xs text-gray-500 mt-1">마감 D-2 (학교 홈페이지 연동)</p>
                                                </div>
                                                <div className="bg-white p-3.5 rounded-xl border border-orange-100 shadow-sm cursor-pointer hover:border-orange-300 transition">
                                                    <span className="bg-orange-50 text-orange-600 text-[10px] font-extrabold px-1.5 py-0.5 rounded uppercase mb-1.5 inline-block">서울시 교육청 정책</span>
                                                    <p className="font-bold text-gray-800 text-sm leading-tight">2026학년도 자유학기제 운영 방안 📚</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </aside>

                                {/* 중앙 메인 화면 (맞춤 상담 챗봇) */}
                                <main className="flex-1 flex flex-col bg-white relative">
                                    <div className="flex-1 overflow-y-auto p-8 pb-32 bg-slate-50/50">
                                        <div className="max-w-3xl mx-auto space-y-6">
                                            {/* 안내 배너 (기대효과 4번 요소) */}
                                            <div className="bg-blue-50/80 border border-blue-100 rounded-2xl p-4 flex gap-3 text-sm text-blue-800 mb-8 items-start shadow-sm">
                                                <i data-lucide="info" className="w-5 h-5 text-blue-500 shrink-0 mt-0.5"></i>
                                                <div>
                                                    <p className="font-bold mb-0.5">{regionalPersona === 'student' ? '안전한 맞춤형 학습 보조' : '지역 맞춤 24시간 교육 상담'}</p>
                                                    <p className="text-blue-600/80">{regionalPersona === 'student' ? '유해 정보가 차단된 교육청 승인 지식과 KBS 아카이브 내에서만 안전하게 답변합니다.' : '맘카페 검색이나 학교 전화 문의 없이, 관할 교육청 및 학교 공문을 기반으로 정확하게 답변해 드립니다.'}</p>
                                                </div>
                                            </div>

                                            <div className="flex justify-end slide-up">
                                                <div className={`text-white p-4 rounded-2xl rounded-tr-none max-w-[80%] shadow-sm ${regionalPersona === 'student' ? 'bg-blue-600' : 'bg-emerald-600'}`}>
                                                    <p className="text-sm font-medium">{regionalQuery}</p>
                                                </div>
                                            </div>

                                            {isRegionalGenerating && (
                                                <div className="flex items-start gap-4 fade-in">
                                                    <div className="w-8 h-8 bg-gradient-to-br from-slate-400 to-slate-600 rounded-full flex items-center justify-center shrink-0 shadow-md">
                                                        <span className="text-white text-xs font-bold">AI</span>
                                                    </div>
                                                    <div className="bg-white border p-4 rounded-2xl rounded-tl-none flex items-center gap-3">
                                                        <div className="flex gap-1">
                                                            <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '0ms'}}></div>
                                                            <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '150ms'}}></div>
                                                            <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay: '300ms'}}></div>
                                                        </div>
                                                        <span className="text-sm text-slate-500 font-medium">지역 교육 데이터 및 안전한 출처를 검색 중입니다...</span>
                                                    </div>
                                                </div>
                                            )}

                                            {showRegionalResult && (
                                                <div className="flex items-start gap-4 slide-up">
                                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 shadow-md mt-1 ${regionalPersona === 'student' ? 'bg-gradient-to-br from-blue-500 to-indigo-600' : 'bg-gradient-to-br from-emerald-500 to-teal-600'}`}>
                                                        <span className="text-white text-xs font-bold">AI</span>
                                                    </div>
                                                    <div className="flex-1 space-y-4">
                                                        {regionalPersona === 'student' ? (
                                                            // 학생용 AI 답변
                                                            <>
                                                                <div className="inline-flex items-center gap-1.5 bg-blue-50 border border-blue-200 text-blue-700 px-3 py-1.5 rounded-full text-xs font-bold shadow-sm">
                                                                    <i data-lucide="check-circle" className="w-3.5 h-3.5"></i>교육청 승인 지식 및 KBS 영상 기반
                                                                </div>
                                                                <div className="bg-white border p-6 rounded-2xl rounded-tl-none shadow-sm prose prose-sm max-w-none prose-slate">
                                                                    <p className="text-gray-800 leading-relaxed">
                                                                        화산 폭발은 지구 내부의 뜨거운 마그마가 지각의 약한 틈을 뚫고 지표면 밖으로 분출하는 현상이에요! 🌋<br/><br/>
                                                                        지하 깊은 곳은 온도가 매우 높아서 암석이 녹아 <strong>'마그마'</strong> 상태로 존재하는데, 이 마그마 안에는 가스가 가득 차 있어요. 콜라를 심하게 흔든 뒤 뚜껑을 열면 거품이 뿜어져 나오는 것처럼, 가스의 압력이 높아지면 지표면을 뚫고 폭발하게 되는 것이 원리랍니다.<br/><br/>
                                                                        우측 패널에 있는 <strong>KBS 다큐멘터리 '화산의 신비'</strong> 영상의 <span className="bg-blue-100 text-blue-800 px-1 rounded font-mono">12:15</span> 구간을 보면 마그마가 솟아오르는 과정을 생생한 그래픽으로 볼 수 있어요!
                                                                    </p>
                                                                </div>
                                                            </>
                                                        ) : (
                                                            // 학부모용 AI 답변
                                                            <>
                                                                <div className="inline-flex items-center gap-1.5 bg-emerald-50 border border-emerald-200 text-emerald-700 px-3 py-1.5 rounded-full text-xs font-bold shadow-sm">
                                                                    <i data-lucide="shield-check" className="w-3.5 h-3.5"></i>관할 교육청 및 학교 공문서 검증 완료
                                                                </div>
                                                                <div className="bg-white border p-6 rounded-2xl rounded-tl-none shadow-sm prose prose-sm max-w-none prose-slate">
                                                                    <p className="text-gray-800 leading-relaxed">
                                                                        <strong>서울초등학교 늘봄학교(돌봄교실)</strong> 신청 일정 및 방법에 대해 안내해 드립니다.<br/><br/>
                                                                        관할 교육청 지침 및 최근 학교에서 발행된 가정통신문에 따르면, 다음 달 신청 일정은 아래와 같습니다.<br/>
                                                                    </p>
                                                                    <ul className="text-gray-700 bg-slate-50 p-4 rounded-xl border border-slate-100 my-4">
                                                                        <li><strong>신청 기간:</strong> 2026년 3월 15일(월) ~ 3월 19일(금) 16:00까지</li>
                                                                        <li><strong>신청 대상:</strong> 1~2학년 재학생 중 맞벌이 가정</li>
                                                                        <li><strong>신청 방법:</strong> 학교 홈페이지 [방과후/돌봄] 메뉴 접속 후 온라인 신청 (우측 원본 링크 참고)</li>
                                                                    </ul>
                                                                    <p className="text-gray-800 leading-relaxed">
                                                                        제출 서류 등 상세 요건은 우측 패널의 <strong>'2026학년도 늘봄학교 신청 안내문.pdf'</strong> 원본에서 확인하실 수 있습니다.
                                                                    </p>
                                                                </div>
                                                            </>
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                            <div ref={regionalChatEndRef}></div>
                                        </div>
                                    </div>

                                    {/* 하단 입력창 */}
                                    <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white via-slate-50 to-transparent pt-10 pb-6 px-8 z-20">
                                        <form onSubmit={handleRegionalSubmit} className={`max-w-3xl mx-auto flex items-end gap-2 bg-white border-2 focus-within:border-blue-500 rounded-3xl p-2 shadow-lg transition-colors ${regionalPersona === 'parent' ? 'focus-within:border-emerald-500' : 'focus-within:border-blue-500'}`}>
                                            <textarea rows="1" className="w-full bg-transparent p-3 pl-4 focus:outline-none resize-none text-gray-700 max-h-32" 
                                                placeholder={regionalPersona === 'student' ? "학교 공부, 수행평가 등 궁금한 것을 물어봐! (예: 조선시대 역사)" : "학사 일정, 진학 정보, 방과후 프로그램 등 무엇이든 물어보세요."}
                                                value={regionalQuery} onChange={(e) => setRegionalQuery(e.target.value)}
                                            ></textarea>
                                            <button type="submit" className={`p-3 rounded-2xl shrink-0 text-white shadow-md transition ${regionalPersona === 'student' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-emerald-600 hover:bg-emerald-700'}`}>
                                                <i data-lucide="send" className="w-5 h-5"></i>
                                            </button>
                                        </form>
                                    </div>
                                </main>

                                {/* 3. 출처 및 검증 패널 (우측 사이드바) */}
                                <aside className={`w-80 md:w-96 border-l flex flex-col shrink-0 z-10 transition-all duration-300 ${regionalPersona === 'student' ? 'bg-blue-50/50 border-blue-100' : 'bg-emerald-50/30 border-emerald-100'} ${showRegionalResult ? 'translate-x-0' : 'translate-x-full hidden'}`}>
                                    <div className="p-4 border-b bg-white flex justify-between items-center z-10 shadow-sm">
                                        <h3 className={`font-extrabold flex items-center gap-2 ${regionalPersona === 'student' ? 'text-blue-900' : 'text-emerald-900'}`}>
                                            <i data-lucide="search-check" className={`w-5 h-5 ${regionalPersona === 'student' ? 'text-blue-600' : 'text-emerald-600'}`}></i> 
                                            검증된 출처 (RAG)
                                        </h3>
                                    </div>
                                    
                                    <div className="flex border-b bg-white">
                                        <button onClick={() => setRegionalRightTab('video')} className={`flex-1 py-3 text-sm font-bold border-b-2 transition ${regionalRightTab === 'video' ? (regionalPersona === 'student' ? 'border-blue-600 text-blue-600' : 'border-emerald-600 text-emerald-600') : 'border-transparent text-gray-500 hover:text-gray-700'}`}>추천 영상 자료</button>
                                        <button onClick={() => setRegionalRightTab('doc')} className={`flex-1 py-3 text-sm font-bold border-b-2 transition ${regionalRightTab === 'doc' ? (regionalPersona === 'student' ? 'border-blue-600 text-blue-600' : 'border-emerald-600 text-emerald-600') : 'border-transparent text-gray-500 hover:text-gray-700'}`}>공공 문서 원본</button>
                                    </div>

                                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                        {regionalRightTab === 'video' && regionalPersona === 'student' && (
                                            <div className="slide-up space-y-4">
                                                <div className="bg-white rounded-2xl border border-blue-200 shadow-md overflow-hidden group">
                                                    <div className="bg-gray-800 aspect-video relative flex items-center justify-center cursor-pointer">
                                                        <img src="https://images.unsplash.com/photo-1620216654215-62057ea4d8db?auto=format&fit=crop&q=80&w=400&h=225" className="absolute inset-0 w-full h-full object-cover opacity-60" alt="volcano" />
                                                        <div className="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center shadow-lg group-hover:scale-110 transition z-10"><i data-lucide="play" className="w-6 h-6 text-white ml-1"></i></div>
                                                        <span className="absolute bottom-2 right-2 bg-black/80 text-white text-[10px] px-1.5 py-0.5 rounded font-mono">50:22</span>
                                                    </div>
                                                    <div className="p-4">
                                                        <span className="bg-red-50 text-red-600 border border-red-200 text-[10px] font-extrabold px-1.5 py-0.5 rounded uppercase mb-2 inline-block">KBS 다큐멘터리</span>
                                                        <h4 className="font-bold text-gray-900 text-sm leading-tight mb-3">화산의 신비 2부: 지구의 숨결</h4>
                                                        <div className="bg-blue-50 rounded-lg p-2.5 border border-blue-100">
                                                            <p className="text-xs text-blue-800 mb-1 font-bold flex items-center gap-1"><i data-lucide="clock" className="w-3 h-3"></i> 타임스탬프 자동 재생</p>
                                                            <button className="w-full text-left flex items-center justify-between p-2 bg-white hover:bg-blue-100 border border-blue-200 rounded transition group/btn shadow-sm">
                                                                <span className="text-sm font-bold text-gray-800 group-hover/btn:text-blue-700">마그마 분출의 원리</span>
                                                                <span className="text-xs font-mono font-bold bg-blue-600 text-white px-2 py-0.5 rounded">12:15 ~ 14:00</span>
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {regionalRightTab === 'doc' && regionalPersona === 'parent' && (
                                            <div className="slide-up space-y-4">
                                                <div className="bg-white p-4 rounded-2xl border border-emerald-200 shadow-md hover:border-emerald-400 transition cursor-pointer">
                                                    <div className="flex items-start gap-3">
                                                        <div className="bg-emerald-100 p-2.5 rounded-lg text-emerald-700 shrink-0 mt-0.5 shadow-sm">
                                                            <i data-lucide="file-text" className="w-5 h-5"></i>
                                                        </div>
                                                        <div>
                                                            <span className="bg-emerald-50 text-emerald-700 border border-emerald-200 text-[10px] font-extrabold px-1.5 py-0.5 rounded mb-1 inline-block">서울초등학교 가정통신문</span>
                                                            <h4 className="font-bold text-gray-900 text-sm mb-2">2026학년도 1학기 늘봄학교 신청 안내.pdf</h4>
                                                            <p className="text-xs text-gray-600 bg-slate-50 p-2 rounded border border-slate-100">
                                                                ...<mark className="bg-yellow-200 px-1 font-bold text-gray-900">신청 기간: 3월 15일(월) ~ 3월 19일(금)</mark> 기간 내 학교 홈페이지를 통해 접수 바랍니다...
                                                            </p>
                                                            <div className="mt-3 flex gap-2">
                                                                <button className="flex-1 inline-flex justify-center items-center gap-1 text-xs font-bold text-white bg-emerald-600 px-3 py-1.5 rounded shadow-sm hover:bg-emerald-700">
                                                                    원본 문서 열람
                                                                </button>
                                                                <button className="flex-1 inline-flex justify-center items-center gap-1 text-xs font-bold text-slate-700 bg-white border border-slate-300 px-3 py-1.5 rounded shadow-sm hover:bg-slate-50">
                                                                    홈페이지 바로가기
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                        
                                        {/* Placeholder for empty states (e.g. Doc tab in Student mode) */}
                                        {((regionalRightTab === 'doc' && regionalPersona === 'student') || (regionalRightTab === 'video' && regionalPersona === 'parent')) && (
                                            <div className="h-40 flex flex-col items-center justify-center text-gray-400 slide-up border-2 border-dashed border-gray-200 rounded-2xl bg-white/50">
                                                <i data-lucide="file-search" className="w-8 h-8 mb-2 opacity-50"></i>
                                                <p className="text-sm font-medium text-center">현재 답변과 관련된<br/>{regionalRightTab === 'doc' ? '교육청 공식 문서가 없습니다.' : 'KBS 추천 영상이 없습니다.'}</p>
                                            </div>
                                        )}
                                    </div>
                                </aside>
                            </div>
                        )}

                        {/* ========================================== */}
                        {/* VIEW 3: BM-2 세이프 AI 대시보드 (기존 코드 유지) */}
                        {/* ========================================== */}
                        {currentView === 'dashboard' && (
                            <div className="flex flex-1 w-full h-full bg-slate-50 fade-in">
                                <aside className="w-64 bg-slate-900 text-slate-300 flex flex-col shrink-0">
                                    <div className="p-6 pb-2"><h2 className="text-white font-bold tracking-widest text-xs uppercase opacity-50 mb-4">Governance</h2><nav className="space-y-2"><button onClick={() => setDashTab('main')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition ${dashTab === 'main' ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-slate-800 hover:text-white'}`}><i data-lucide="layout-dashboard" className="w-5 h-5"></i> 1. 통합 모니터링</button></nav></div>
                                </aside>
                                <main className="flex-1 overflow-y-auto p-8 flex items-center justify-center bg-slate-100">
                                    <div className="text-center text-slate-500">
                                        <i data-lucide="shield-check" className="w-16 h-16 mx-auto mb-4 text-slate-300"></i>
                                        <h2 className="text-xl font-bold text-slate-700 mb-2">세이프 대시보드 환경</h2>
                                        <p>관리자 보안 로그 및 통계 모니터링 뷰어</p>
                                    </div>
                                </main>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
